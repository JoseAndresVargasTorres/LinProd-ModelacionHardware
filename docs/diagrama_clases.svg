<text x="596" y="172" font-size="11" fill="#555" font-family="monospace">/ task_count : int</text>

<line x1="590" y1="180" x2="800" y2="180" stroke="#004680" stroke-width="0.5"/>

<text x="596" y="196" font-size="11" fill="#111" font-family="monospace">+ add_task(task)</text>
<text x="596" y="212" font-size="11" fill="#111" font-family="monospace">+ receive(p, cycle)</text>
<text x="596" y="228" font-size="11" fill="#111" font-family="monospace">+ tick(c) : list</text>
<text x="596" y="244" font-size="11" fill="#111" font-family="monospace">+ is_done() : bool</text>
<text x="596" y="260" font-size="11" fill="#111" font-family="monospace">+ reset()</text>
<text x="596" y="276" font-size="11" fill="#111" font-family="monospace">+ snapshot() : dict</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  CLASE  ProductionLine   x=920  y=50  w=225  h=168        -->
<!-- ═══════════════════════════════════════════════════════════ -->
<clipPath id="cPL"><rect x="920" y="50" width="225" height="168" rx="3"/></clipPath>
<rect x="920" y="50" width="225" height="168" rx="3"
