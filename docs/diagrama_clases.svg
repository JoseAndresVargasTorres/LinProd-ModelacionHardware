<line x1="920" y1="75" x2="1145" y2="75" stroke="#004680" stroke-width="0.8"/>

<text x="926" y="92"  font-size="11" fill="#555" font-family="monospace">/ processes : list</text>
<text x="926" y="108" font-size="11" fill="#555" font-family="monospace">/ process_count : int</text>
<text x="926" y="124" font-size="11" fill="#555" font-family="monospace">/ initial_process</text>
<text x="926" y="140" font-size="11" fill="#555" font-family="monospace">/ final_process</text>

<line x1="920" y1="148" x2="1145" y2="148" stroke="#004680" stroke-width="0.5"/>

<text x="926" y="164" font-size="11" fill="#111" font-family="monospace">+ add_process(p)</text>
<text x="926" y="180" font-size="11" fill="#111" font-family="monospace">+ validate()</text>
<text x="926" y="196" font-size="11" fill="#111" font-family="monospace">+ reset()</text>
<text x="926" y="212" font-size="11" fill="#111" font-family="monospace">+ snapshot() : dict</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  CLASE  Simulator   x=200  y=372  w=210  h=264            -->
<!-- ═══════════════════════════════════════════════════════════ -->
<clipPath id="cSim"><rect x="200" y="372" width="210" height="264" rx="3"/></clipPath>
<rect x="200" y="372" width="210" height="264" rx="3"
      fill="white" stroke="#004680" stroke-width="1.6"/>
<rect x="200" y="372" width="210" height="25" fill="#004680"
      clip-path="url(#cSim)"/>
<text x="305" y="389" text-anchor="middle" font-size="13"
      font-weight="bold" fill="white" font-family="Arial,sans-serif">Simulator</text>

<line x1="200" y1="397" x2="410" y2="397" stroke="#004680" stroke-width="0.8"/>

<text x="206" y="414" font-size="11" fill="#111" font-family="monospace">+ current_cycle : int</text>
<text x="206" y="430" font-size="11" fill="#111" font-family="monospace">- n_products : int</text>
<text x="206" y="446" font-size="11" fill="#111" font-family="monospace">- line : ProductionLine</text>
<text x="206" y="462" font-size="11" fill="#555" font-family="monospace">/ is_started : bool</text>
<text x="206" y="478" font-size="11" fill="#555" font-family="monospace">/ is_paused : bool</text>
