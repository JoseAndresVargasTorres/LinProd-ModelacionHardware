<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1175 660" width="1175" height="660">

<defs>
  <!-- arrowhead sólido (composición / asociación) -->
  <marker id="arrow" markerWidth="10" markerHeight="7"
          refX="9" refY="3.5" orient="auto">
    <polygon points="0 0,10 3.5,0 7" fill="#004680"/>
  </marker>
  <!-- arrowhead abierto (dependencia dashed) -->
  <marker id="dep" markerWidth="10" markerHeight="7"
          refX="9" refY="3.5" orient="auto">
    <polyline points="0 0,10 3.5,0 7" fill="none"
              stroke="#004680" stroke-width="1.6"/>
  </marker>
</defs>

<!-- ═══════════════ FONDO ═══════════════ -->
<rect width="1175" height="660" fill="#f5f8fc"/>

<!-- ═══════════════ MÓDULOS (capas con borde punteado) ═══════════════ -->

<!-- model.py — capa de fondo para las 4 clases de modelo -->
<rect x="10" y="38" width="1155" height="260"
      rx="5" fill="none" stroke="#a8bcd8"
      stroke-width="1.2" stroke-dasharray="6,4"/>
<text x="16" y="34" font-size="10" fill="#7090b0"
      font-family="Arial,sans-serif" font-style="italic">«módulo: linprod/model.py»</text>

<!-- simulator.py -->
<rect x="188" y="358" width="242" height="290"
      rx="5" fill="none" stroke="#a8bcd8"
      stroke-width="1.2" stroke-dasharray="6,4"/>
<text x="193" y="354" font-size="10" fill="#7090b0"
      font-family="Arial,sans-serif" font-style="italic">«módulo: simulator.py»</text>

<!-- app.py -->
<rect x="908" y="358" width="253" height="178"
      rx="5" fill="none" stroke="#a8bcd8"
      stroke-width="1.2" stroke-dasharray="6,4"/>
<text x="913" y="354" font-size="10" fill="#7090b0"
      font-family="Arial,sans-serif" font-style="italic">«módulo: app.py»</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  CLASE  Product    x=20  y=50  w=210  h=200               -->
<!-- ═══════════════════════════════════════════════════════════ -->
<clipPath id="cProd"><rect x="20" y="50" width="210" height="200" rx="3"/></clipPath>
<rect x="20" y="50" width="210" height="200" rx="3"
      fill="white" stroke="#004680" stroke-width="1.6"/>
<rect x="20" y="50" width="210" height="25" fill="#004680"
      clip-path="url(#cProd)"/>
<text x="125" y="67" text-anchor="middle" font-size="13"
      font-weight="bold" fill="white" font-family="Arial,sans-serif">Product</text>

<line x1="20" y1="75" x2="230" y2="75" stroke="#004680" stroke-width="0.8"/>

<text x="26" y="92"  font-size="11" fill="#111" font-family="monospace">+ product_id : int</text>
<text x="26" y="108" font-size="11" fill="#111" font-family="monospace">+ entry_time : int</text>
<text x="26" y="124" font-size="11" fill="#111" font-family="monospace">+ exit_time : int|None</text>
<text x="26" y="140" font-size="11" fill="#111" font-family="monospace">+ task_history : list</text>
<text x="26" y="156" font-size="11" fill="#555" font-family="monospace">/ is_completed : bool</text>
<text x="26" y="172" font-size="11" fill="#555" font-family="monospace">/ total_time : int|None</text>

<line x1="20" y1="180" x2="230" y2="180" stroke="#004680" stroke-width="0.5"/>

<text x="26" y="196" font-size="11" fill="#111" font-family="monospace">+ record_task_start()</text>
<text x="26" y="212" font-size="11" fill="#111" font-family="monospace">+ record_task_end()</text>
<text x="26" y="228" font-size="11" fill="#111" font-family="monospace">+ mark_completed()</text>
<text x="26" y="244" font-size="11" fill="#111" font-family="monospace">+ snapshot() : dict</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  CLASE  Task       x=300  y=50  w=210  h=216              -->
<!-- ═══════════════════════════════════════════════════════════ -->
<clipPath id="cTask"><rect x="300" y="50" width="210" height="216" rx="3"/></clipPath>
<rect x="300" y="50" width="210" height="216" rx="3"
      fill="white" stroke="#004680" stroke-width="1.6"/>
<rect x="300" y="50" width="210" height="25" fill="#004680"
      clip-path="url(#cTask)"/>
<text x="405" y="67" text-anchor="middle" font-size="13"
      font-weight="bold" fill="white" font-family="Arial,sans-serif">Task</text>

<line x1="300" y1="75" x2="510" y2="75" stroke="#004680" stroke-width="0.8"/>

<text x="306" y="92"  font-size="11" fill="#111" font-family="monospace">+ name : str</text>
<text x="306" y="108" font-size="11" fill="#111" font-family="monospace">+ process_time : int</text>
<text x="306" y="124" font-size="11" fill="#111" font-family="monospace">+ busy : bool</text>
<text x="306" y="140" font-size="11" fill="#111" font-family="monospace">+ process : Process</text>
<text x="306" y="156" font-size="11" fill="#555" font-family="monospace">/ current_product</text>

<line x1="300" y1="164" x2="510" y2="164" stroke="#004680" stroke-width="0.5"/>

<text x="306" y="180" font-size="11" fill="#111" font-family="monospace">+ receive(p, cycle)</text>
<text x="306" y="196" font-size="11" fill="#111" font-family="monospace">+ tick(c) : P|None</text>
<text x="306" y="212" font-size="11" fill="#111" font-family="monospace">+ is_done() : bool</text>
<text x="306" y="228" font-size="11" fill="#111" font-family="monospace">+ queue_size() : int</text>
<text x="306" y="244" font-size="11" fill="#111" font-family="monospace">+ reset()</text>
<text x="306" y="260" font-size="11" fill="#111" font-family="monospace">+ snapshot() : dict</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  CLASE  Process    x=590  y=50  w=210  h=232              -->
<!-- ═══════════════════════════════════════════════════════════ -->
<clipPath id="cProc"><rect x="590" y="50" width="210" height="232" rx="3"/></clipPath>
<rect x="590" y="50" width="210" height="232" rx="3"
      fill="white" stroke="#004680" stroke-width="1.6"/>
<rect x="590" y="50" width="210" height="25" fill="#004680"
