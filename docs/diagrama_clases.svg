<text x="926" y="518" font-size="11" fill="#111" font-family="monospace">+ reset()</text>

<!-- ═══════════════════════════════════════════════════════════ -->
<!--  RELACIONES                                                -->
<!-- ═══════════════════════════════════════════════════════════ -->

<!--
  ── 1. ProductionLine ◆──────────────── Process  (composición 1 : 1..*) ──
  El diamante nace en el borde izquierdo de PL (x=920, cy=134).
  La flecha llega al borde derecho de Process (x=800, y=166).
  Hueco entre cajas: x=800 … x=920.
  Multiplicidades colocadas en ese hueco, sin tocar ninguna caja.
-->
<polygon points="920,134 909,128 898,134 909,140" fill="#004680"/>
<line x1="898" y1="134" x2="800" y2="166"
      stroke="#004680" stroke-width="1.6" marker-end="url(#arrow)"/>
<!-- "1" junto al diamante (lado PL), en el hueco -->
<text x="902" y="125" font-size="11" fill="#004680"
      font-family="Arial,sans-serif" font-weight="bold">1</text>
<!-- "1..*" junto a la punta (lado Process), en el hueco -->
<text x="808" y="160" font-size="11" fill="#004680"
      font-family="Arial,sans-serif" font-weight="bold">1..*</text>

<!--
  ── 2. Process ◆──────────────────────── Task  (composición 1 : 1..*) ──
  Diamante en borde izquierdo de Process (x=590, cy=166).
  Flecha al borde derecho de Task (x=510, y=158).
  Hueco entre cajas: x=510 … x=590.
-->
<polygon points="590,166 579,160 568,166 579,172" fill="#004680"/>
<line x1="568" y1="166" x2="510" y2="158"
      stroke="#004680" stroke-width="1.6" marker-end="url(#arrow)"/>
<!-- "1" junto al diamante (lado Process), en el hueco -->
<text x="572" y="157" font-size="11" fill="#004680"
      font-family="Arial,sans-serif" font-weight="bold">1</text>
<!-- "1..*" junto a la punta (lado Task), en el hueco -->
<text x="514" y="150" font-size="11" fill="#004680"
      font-family="Arial,sans-serif" font-weight="bold">1..*</text>

<!--
  ── 3. Task ──────────────────────────── Product  (asociación "procesa 0..1") ──
  Línea del borde izquierdo de Task (x=300, y=158) al borde derecho de Product (x=230, y=150).
  Hueco entre cajas: x=230 … x=300.
  Etiqueta de rol encima de la línea; multiplicidad debajo, ambas en el hueco.
-->
<line x1="300" y1="158" x2="230" y2="150"
      stroke="#004680" stroke-width="1.6" marker-end="url(#arrow)"/>
<!-- rol de la asociación, encima de la línea, en el hueco -->
<text x="240" y="142" font-size="9" fill="#555"
      font-family="Arial,sans-serif" font-style="italic">procesa</text>
<!-- multiplicidad 0..1 en lado Product, debajo de la línea, en el hueco -->
<text x="234" y="168" font-size="11" fill="#004680"
      font-family="Arial,sans-serif" font-weight="bold">0..1</text>

<!--
  ── 4. Process ──────────── (auto-ref) next_process : 0..1 ──
  Lazo que sale del borde derecho de Process (x=800) en y=130,
  rodea el hueco hasta x=855 y regresa a y=215.
  El hueco Process─PL tiene 120 px (x=800…x=920).
  Etiquetas en ese hueco, ninguna toca las cajas ni el lazo.
-->
<path d="M800,130 H855 V215 H800"
      fill="none" stroke="#004680" stroke-width="1.6"
      marker-end="url(#arrow)"/>
<!-- rol encima del segmento horizontal superior del lazo -->
<text x="803" y="122" font-size="9" fill="#555"
      font-family="Arial,sans-serif" font-style="italic">next_process</text>
<!-- multiplicidad 0..1 debajo del punto de regreso del lazo (punta de flecha en y=215) -->
<text x="803" y="232" font-size="11" fill="#004680"
      font-family="Arial,sans-serif" font-weight="bold">0..1</text>

<!--
  ── 5. Simulator -.-.-.-> ProductionLine  (dependencia «usa») ──
  Camino en L: sube del tope de Simulator, cruza horizontal a x=1032,
  baja al fondo de PL (y=218). La etiqueta «usa» va en el segmento
  horizontal (y=328), en el espacio libre entre las dos filas de módulos.
-->
<path d="M305,372 V328 H1032 V218"
      fill="none" stroke="#004680" stroke-width="1.4"
      stroke-dasharray="8,4" marker-end="url(#dep)"/>
<text x="590" y="320" font-size="10" fill="#004680"
      font-family="Arial,sans-serif" font-style="italic">«usa»</text>

<!--
  ── 6. LinProdApp -.-.-.-> Simulator  (dependencia «usa») ──
  Diagonal desde borde izquierdo de LinProdApp (920, 448)
  hasta borde derecho de Simulator (410, 504).
  Etiqueta en el espacio abierto entre las dos clases.
-->
<line x1="920" y1="448" x2="410" y2="504"
      stroke="#004680" stroke-width="1.4"
      stroke-dasharray="8,4" marker-end="url(#dep)"/>
<text x="645" y="460" font-size="10" fill="#004680"
      font-family="Arial,sans-serif" font-style="italic">«usa»</text>

</svg>
