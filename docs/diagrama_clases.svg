<clipPath id="cApp"><rect x="920" y="372" width="225" height="152" rx="3"/></clipPath>
<rect x="920" y="372" width="225" height="152" rx="3"
      fill="white" stroke="#004680" stroke-width="1.6"/>
<rect x="920" y="372" width="225" height="25" fill="#004680"
      clip-path="url(#cApp)"/>
<text x="1032" y="389" text-anchor="middle" font-size="13"
      font-weight="bold" fill="white" font-family="Arial,sans-serif">LinProdApp</text>

<line x1="920" y1="397" x2="1145" y2="397" stroke="#004680" stroke-width="0.8"/>

