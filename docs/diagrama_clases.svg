<line x1="590" y1="75" x2="800" y2="75" stroke="#004680" stroke-width="0.8"/>

<text x="596" y="92"  font-size="11" fill="#111" font-family="monospace">+ name : str</text>
<text x="596" y="108" font-size="11" fill="#111" font-family="monospace">+ is_initial : bool</text>
<text x="596" y="124" font-size="11" fill="#111" font-family="monospace">+ is_final : bool</text>
<text x="596" y="140" font-size="11" fill="#111" font-family="monospace">+ next_process : Process</text>
